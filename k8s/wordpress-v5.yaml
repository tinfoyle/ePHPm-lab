metadata:
  name: wordpress-v5-ephpm
  namespace: wordpress-v5
spec:
  replicas: 0
  selector:
    matchLabels:
      app: wordpress-v5-ephpm
  template:
    metadata:
      labels:
        app: wordpress-v5-ephpm
    spec:
      initContainers:
        - name: prepare-wordpress
          image: wordpress:cli-php8.4
          command: ["sh", "/scripts/prepare-wordpress.sh"]
          env:
            - name: CACHE_BACKEND
              value: native
            - name: WORDPRESS_DB_HOST
              value: wordpress-v5-mysql
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 1024Mi
          volumeMounts:
            - name: app
              mountPath: /app
            - name: scripts
              mountPath: /scripts
      containers:
        - name: ephpm
          image: ephpm/ephpm:v0.4.0-php8.4
          command: ["sh", "/scripts/ephpm-start.sh"]
          env:
            - name: CACHE_BACKEND
              value: native
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /_ephpm/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
