# OPcache cluster-wide invalidation demo (ePHPm >= 0.4.0).
#
# Two ePHPm nodes form a gossip cluster. `ephpm deploy` on ONE node writes
# `opcache:version:_default` into the replicated KV; the per-request watcher
# on EVERY node drops the vhost's OPcache entries on its next request —
# atomic cluster-wide cache invalidation with no restarts, no LB dance,
# no opcache.validate_timestamps stat storm.
#
# Design doc: https://ephpm.dev/roadmap/opcache-clustering/
# Test driver: opcache-cluster-test.sh
apiVersion: v1
kind: Namespace
metadata:
  name: opcache-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opcache-demo-files
  namespace: opcache-demo
data:
  start.sh: |
    #!/bin/sh
    set -eu

    # chitchat advertises the *bind* address, so bind the pod IP — peers
    # must be able to reach it. Seeds are the stable per-pod DNS names.
    cat > /tmp/ephpm.toml <<TOML
    [server]
    listen = "0.0.0.0:8080"
    document_root = "/web"

    [cluster]
    enabled = true
    bind = "${POD_IP}:7946"
    join = [
      "opcache-demo-0.opcache-demo-hs.opcache-demo.svc.cluster.local:7946",
      "opcache-demo-1.opcache-demo-hs.opcache-demo.svc.cluster.local:7946",
    ]
    cluster_id = "opcache-demo"
    # Demo-only shared secret (gossip + KV data plane sealed with it).
    # Generate your own for anything beyond this demo: openssl rand -base64 32
    secret = "opcache-demo-not-a-real-secret"

    [kv.redis_compat]
    # The ephpm deploy / cache reset CLIs write the version key over RESP.
    enabled = true
    listen = "127.0.0.1:6379"

    [opcache]
    cluster_invalidation = true
    TOML

    exec ephpm serve --config /tmp/ephpm.toml
  opcache_status.php: |
    <?php
    header('Content-Type: application/json');
    $target = '/web/opcache_target.php';
    $s = function_exists('opcache_get_status') ? opcache_get_status(true) : null;
    $scripts = (is_array($s) && isset($s['scripts'])) ? $s['scripts'] : [];
    $entry = $scripts[$target] ?? null;
    echo json_encode([
        'pod' => gethostname(),
        'opcache_enabled' => is_array($s) ? (bool) ($s['opcache_enabled'] ?? false) : false,
        // opcache_invalidate() keeps the hash entry but marks it unusable —
        // opcache_is_script_cached() is the accurate "would a hit reuse
        // bytecode" signal; presence in ['scripts'] is not.
        'target_cached' => function_exists('opcache_is_script_cached')
            ? opcache_is_script_cached($target)
            : ($entry !== null),
        'target_hits' => $entry['hits'] ?? null,
        'cached_scripts' => count($scripts),
    ]);
  opcache_target.php: |
    <?php
    header('Content-Type: application/json');
    echo json_encode(['marker' => 'v1', 'pod' => gethostname()]);
  seed-web.sh: |
    #!/bin/sh
    # Copy the correctness fixtures out of the read-only configmap and
    # ALSO generate ~30 small include files + bench.php so the blip test
    # (opcache-blip-test.sh) has real compile weight to observe. A single
    # tiny file's recompile is invisible under 50 rps; 31 dropped entries
    # produce a measurable p95/p99 blip on the first request after
    # `ephpm deploy` (or on the first request each new pod serves during a
    # php-fpm rolling restart).
    set -eu
    cp /files/opcache_status.php /files/opcache_target.php /web/
    mkdir -p /web/inc
    i=1
    while [ $i -le 30 ]; do
        n=$(printf '%02d' "$i")
        cat > "/web/inc/inc_${n}.php" <<PHP
    <?php
    class Inc${n} {
        public static function value(): int { return ${i} * 7919; }
        public static function label(): string { return 'inc-${n}-' . self::value(); }
    }
    function inc_${n}_hash(string \$seed): string {
        return hash('sha256', \$seed . Inc${n}::label());
    }
    PHP
        i=$((i + 1))
    done
    cat > /web/bench.php <<'PHP'
    <?php
    header('Content-Type: application/json');
    $checksum = 'seed';
    for ($i = 1; $i <= 30; $i++) {
        $n = sprintf('%02d', $i);
        require_once __DIR__ . "/inc/inc_{$n}.php";
        $fn = "inc_{$n}_hash";
        $checksum = $fn($checksum);
    }
    echo json_encode([
        'pod' => gethostname(),
        'checksum' => $checksum,
        'includes' => 30,
    ]);
    PHP
---
# Headless service: stable per-pod DNS for gossip seeds.
apiVersion: v1
kind: Service
metadata:
  name: opcache-demo-hs
  namespace: opcache-demo
spec:
  clusterIP: None
  selector:
    app: opcache-demo
  ports:
    - name: http
      port: 8080
    - name: gossip
      port: 7946
      protocol: UDP
---
# Non-headless load-balanced service for the k6 blip test — round-robins
# across both pods so the invalidation blip is observable across the cluster.
apiVersion: v1
kind: Service
metadata:
  name: opcache-demo-lb
  namespace: opcache-demo
spec:
  selector:
    app: opcache-demo
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opcache-demo
  namespace: opcache-demo
spec:
  serviceName: opcache-demo-hs
  replicas: 2
  selector:
    matchLabels:
      app: opcache-demo
  template:
    metadata:
      labels:
        app: opcache-demo
    spec:
      containers:
        - name: ephpm
          # OPcache clustering ships in 0.4.0 (0.3.x has the watcher's
          # prerequisites — active OPcache — but not the invalidation).
          image: ephpm/ephpm:v0.4.0-php8.4
          command: ["sh", "/files/start.sh"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8080
            - containerPort: 7946
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /_ephpm/ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: files
              mountPath: /files
            - name: web
              mountPath: /web
      initContainers:
        # Copy the PHP fixtures out of the read-only configmap so OPcache
        # sees ordinary files (and future demos can mutate them). Also
        # generates the compile-weight bench.php fixture (30 includes) —
        # see seed-web.sh for the rationale.
        - name: seed-web
          image: busybox:1.36
          command: ["sh", "/files/seed-web.sh"]
          volumeMounts:
            - name: files
              mountPath: /files
            - name: web
              mountPath: /web
      volumes:
        - name: files
          configMap:
            name: opcache-demo-files
            defaultMode: 0755
        - name: web
          emptyDir: {}
