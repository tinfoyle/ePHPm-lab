apiVersion: batch/v1
kind: Job
metadata:
  name: k6-v4-ephpm-worker
  namespace: laravel-v4
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.53.0
          env:
            - name: BASE_URL
              value: http://laravel-v4-ephpm-worker:8080
          command: ["sh", "/scripts/run-k6.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: k6-v4-script
            defaultMode: 0755
