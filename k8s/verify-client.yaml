apiVersion: v1
kind: Pod
metadata:
  name: verify-client
  namespace: php-bench
spec:
  restartPolicy: Never
  containers:
  - name: client
    image: busybox:1.37
    command: ["sh", "-c", "sleep 3600"]
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 25m
        memory: 32Mi
