apiVersion: v1
kind: ConfigMap
metadata:
  name: php-bench-v2-nginx
  namespace: php-bench
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /var/www/html;
      index index.php;

      location / {
        try_files $uri /index.php?$query_string;
      }

      location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: php-bench-v2-ephpm
  namespace: php-bench
data:
  ephpm.toml: |
    [server]
    listen = "0.0.0.0:8080"
    document_root = "/var/www/html"
    index_files = ["index.php"]
    fallback = ["$uri", "/index.php"]

    [server.request]
    max_body_size = 1024
    max_header_size = 4096
    trusted_hosts = ["ephpm-v2", "ephpm-v2.php-bench.svc", "ephpm-v2.php-bench.svc.cluster.local", "localhost", "127.0.0.1"]

    [server.metrics]
    enabled = false

    [server.file_cache]
    enabled = true

    [server.security]
    open_basedir = false
    disable_shell_exec = true

    [php]
    max_execution_time = 30
    memory_limit = "128M"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-fpm-nginx-v2
  namespace: php-bench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-fpm-nginx-v2
  template:
    metadata:
      labels:
        app: php-fpm-nginx-v2
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: app
          mountPath: /var/www/html
          readOnly: true
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
          readOnly: true
      - name: php-fpm
        image: php:8.4-fpm-alpine
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: app
          mountPath: /var/www/html
          readOnly: true
      volumes:
      - name: app
        configMap:
          name: php-bench-v2-app
          items:
          - key: index.php
            path: index.php
          - key: src.Http.Router.php
            path: src/Http/Router.php
          - key: src.Repository.ProductRepository.php
            path: src/Repository/ProductRepository.php
          - key: src.View.Renderer.php
            path: src/View/Renderer.php
          - key: templates.products.php
            path: templates/products.php
          - key: data.products.json
            path: data/products.json
      - name: nginx-conf
        configMap:
          name: php-bench-v2-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: php-fpm-nginx-v2
  namespace: php-bench
spec:
  selector:
    app: php-fpm-nginx-v2
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ephpm-v2
  namespace: php-bench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ephpm-v2
  template:
    metadata:
      labels:
        app: ephpm-v2
    spec:
      containers:
      - name: ephpm
        image: ephpm/ephpm:v0.3.0-php8.4
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 125m
            memory: 160Mi
          limits:
            cpu: 250m
            memory: 320Mi
        volumeMounts:
        - name: app
          mountPath: /var/www/html
          readOnly: true
        - name: config
          mountPath: /etc/ephpm/ephpm.toml
          subPath: ephpm.toml
          readOnly: true
      volumes:
      - name: app
        configMap:
          name: php-bench-v2-app
          items:
          - key: index.php
            path: index.php
          - key: src.Http.Router.php
            path: src/Http/Router.php
          - key: src.Repository.ProductRepository.php
            path: src/Repository/ProductRepository.php
          - key: src.View.Renderer.php
            path: src/View/Renderer.php
          - key: templates.products.php
            path: templates/products.php
          - key: data.products.json
            path: data/products.json
      - name: config
        configMap:
          name: php-bench-v2-ephpm
---
apiVersion: v1
kind: Service
metadata:
  name: ephpm-v2
  namespace: php-bench
spec:
  selector:
    app: ephpm-v2
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-v2-script
  namespace: php-bench
data:
  v2.js: |
    import http from 'k6/http';
    import { check } from 'k6';
    import { Trend } from 'k6/metrics';

    const appElapsed = new Trend('app_elapsed', true);

    export const options = {
      scenarios: {
        fixed_rate: {
          executor: 'constant-arrival-rate',
          rate: Number(__ENV.RATE || 40),
          timeUnit: '1s',
          duration: __ENV.DURATION || '45s',
          preAllocatedVUs: Number(__ENV.PREALLOCATED_VUS || 12),
          maxVUs: Number(__ENV.MAX_VUS || 24),
        },
      },
      thresholds: {
        http_req_failed: ['rate<0.01'],
      },
    };

    const target = __ENV.TARGET;

    const cases = [
      '/products?q=waterproof&sort=score',
      '/products?category=electronics&sort=price',
      '/api/products?q=12v&max_price=200',
      '/api/product?id=8',
    ];

    export default function () {
      const path = cases[(__ITER + __VU) % cases.length];
      const res = http.get(`${target}${path}`);

      check(res, {
        'status is 200': (r) => r.status === 200,
        'has server header': (r) => Boolean(r.headers['X-Server-Software']),
      });

      const elapsed = res.headers['X-App-Elapsed-Ns'];
      if (elapsed) {
        appElapsed.add(Number(elapsed) / 1000000);
      }
    }
