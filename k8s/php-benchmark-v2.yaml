apiVersion: v1
kind: ConfigMap
metadata:
  name: php-bench-v2-app
  namespace: php-bench
data:
  index.php: |
    <?php
    declare(strict_types=1);

    $started = hrtime(true);

    spl_autoload_register(static function (string $class): void {
        $prefix = 'Bench\\';
        if (strncmp($class, $prefix, strlen($prefix)) !== 0) {
            return;
        }

        $relative = substr($class, strlen($prefix));
        $file = __DIR__ . '/src/' . str_replace('\\', '/', $relative) . '.php';
        if (is_file($file)) {
            require $file;
        }
    });

    $router = new Bench\Http\Router(
        new Bench\Repository\ProductRepository(__DIR__ . '/data/products.json'),
        new Bench\View\Renderer(__DIR__ . '/templates')
    );

    $response = $router->dispatch(
        parse_url($_SERVER['REQUEST_URI'] ?? '/', PHP_URL_PATH) ?: '/',
        $_GET
    );

    header('X-App-Elapsed-Ns: ' . (hrtime(true) - $started));
    header('X-PHP-Version: ' . PHP_VERSION);
    header('X-Server-Software: ' . ($_SERVER['SERVER_SOFTWARE'] ?? 'unknown'));
    header('Content-Type: ' . $response['type']);
    http_response_code($response['status']);
    echo $response['body'];
  src.Http.Router.php: |
    <?php
    declare(strict_types=1);

    namespace Bench\Http;

    use Bench\Repository\ProductRepository;
    use Bench\View\Renderer;

    final class Router
    {
        public function __construct(
            private ProductRepository $products,
            private Renderer $renderer
        ) {}

        public function dispatch(string $path, array $query): array
        {
            return match ($path) {
                '/', '/products' => $this->productsPage($query),
                '/api/products' => $this->productsApi($query),
                '/api/product' => $this->productApi($query),
                default => [
                    'status' => 404,
                    'type' => 'application/json',
                    'body' => json_encode(['error' => 'not_found', 'path' => $path]),
                ],
            };
        }

        private function productsPage(array $query): array
        {
            $criteria = $this->criteria($query);
            $products = $this->products->search($criteria);
            $body = $this->renderer->render('products.php', [
                'products' => $products,
                'criteria' => $criteria,
                'summary' => $this->products->summary($products),
            ]);

            return ['status' => 200, 'type' => 'text/html; charset=utf-8', 'body' => $body];
        }

        private function productsApi(array $query): array
        {
            $criteria = $this->criteria($query);
            $products = $this->products->search($criteria);

            return [
                'status' => 200,
                'type' => 'application/json',
                'body' => json_encode([
                    'criteria' => $criteria,
                    'summary' => $this->products->summary($products),
                    'products' => array_slice($products, 0, 24),
                ]),
            ];
        }

        private function productApi(array $query): array
        {
            $id = (int)($query['id'] ?? 1);
            $product = $this->products->find($id);

            return [
                'status' => $product ? 200 : 404,
                'type' => 'application/json',
                'body' => json_encode($product ?: ['error' => 'not_found', 'id' => $id]),
            ];
        }

        private function criteria(array $query): array
        {
            $sort = (string)($query['sort'] ?? 'score');

            return [
                'q' => trim((string)($query['q'] ?? '')),
                'category' => trim((string)($query['category'] ?? '')),
                'max_price' => isset($query['max_price']) ? (float)$query['max_price'] : null,
                'sort' => in_array($sort, ['score', 'price', 'name'], true)
                    ? $sort
                    : 'score',
            ];
        }
    }
  src.Repository.ProductRepository.php: |
    <?php
    declare(strict_types=1);

    namespace Bench\Repository;

    final class ProductRepository
    {
        private ?array $products = null;

        public function __construct(private string $path) {}

        public function find(int $id): ?array
        {
            foreach ($this->all() as $product) {
                if ($product['id'] === $id) {
                    return $product;
                }
            }

            return null;
        }

        public function search(array $criteria): array
        {
            $q = strtolower($criteria['q']);
            $category = strtolower($criteria['category']);
            $maxPrice = $criteria['max_price'];

            $filtered = array_values(array_filter($this->all(), static function (array $product) use ($q, $category, $maxPrice): bool {
                if ($category !== '' && strtolower($product['category']) !== $category) {
                    return false;
                }

                if ($maxPrice !== null && $product['price'] > $maxPrice) {
                    return false;
                }

                if ($q === '') {
                    return true;
                }

                $haystack = strtolower($product['name'] . ' ' . $product['category'] . ' ' . implode(' ', $product['tags']));
                return str_contains($haystack, $q);
            }));

            $sort = $criteria['sort'] ?? 'score';
            usort($filtered, static function (array $a, array $b) use ($sort): int {
                return match ($sort) {
                    'price' => $a['price'] <=> $b['price'],
                    'name' => strcmp($a['name'], $b['name']),
                    default => $b['score'] <=> $a['score'],
                };
            });

            return $filtered;
        }

        public function summary(array $products): array
        {
            $count = count($products);
            $total = array_sum(array_column($products, 'price'));

            return [
                'count' => $count,
                'avg_price' => $count ? round($total / $count, 2) : 0,
                'top_score' => $count ? max(array_column($products, 'score')) : 0,
            ];
        }

        private function all(): array
        {
            if ($this->products === null) {
                $decoded = json_decode(file_get_contents($this->path), true, flags: JSON_THROW_ON_ERROR);
                $this->products = $decoded['products'];
            }

            return $this->products;
        }
    }
  src.View.Renderer.php: |
    <?php
    declare(strict_types=1);

    namespace Bench\View;

    final class Renderer
    {
        public function __construct(private string $templateDir) {}

        public function render(string $template, array $data): string
        {
            extract($data, EXTR_SKIP);
            ob_start();
            require $this->templateDir . '/' . $template;
            return ob_get_clean();
        }
    }
  templates.products.php: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <title>Benchmark Products</title>
    </head>
    <body>
      <main>
        <h1>Benchmark Products</h1>
        <p>Count: <?= htmlspecialchars((string)$summary['count']) ?>; average price: $<?= htmlspecialchars((string)$summary['avg_price']) ?></p>
        <ul>
          <?php foreach (array_slice($products, 0, 20) as $product): ?>
            <li>
              <strong><?= htmlspecialchars($product['name']) ?></strong>
              <span><?= htmlspecialchars($product['category']) ?></span>
              <span>$<?= htmlspecialchars((string)$product['price']) ?></span>
              <span><?= htmlspecialchars(implode(', ', $product['tags'])) ?></span>
            </li>
          <?php endforeach; ?>
        </ul>
      </main>
    </body>
    </html>
  data.products.json: |
