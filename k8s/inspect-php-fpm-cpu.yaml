apiVersion: batch/v1
kind: Job
metadata:
  name: inspect-php-fpm-cpu
  namespace: php-bench
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: k6
        image: grafana/k6:latest
        args: ["run", "-e", "TARGET=http://php-fpm-nginx:8080", "-e", "ROUTE=/cpu.php", "-e", "RATE=50", "-e", "DURATION=30s", "/scripts/inspect.js"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: k6-inspect-script
